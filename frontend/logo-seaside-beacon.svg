<svg xmlns="http://www.w3.org/2000/svg" width="800" height="200" viewBox="0 0 800 200">
  <defs>
    <radialGradient id="sunGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff8e1" stop-opacity="0.95"/>
      <stop offset="60%" stop-color="#dca03c" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#c4733a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ringGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c4733a" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#d4b078" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#c4733a" stop-opacity="0.8"/>
    </linearGradient>
    <filter id="sunShadow">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#ffc864" flood-opacity="0.35"/>
      <feDropShadow dx="0" dy="0" stdDeviation="16" flood-color="#c4733a" flood-opacity="0.15"/>
    </filter>
    <filter id="iconGlow">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#c4733a" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background (transparent) -->
  <rect width="800" height="200" fill="none"/>

  <!-- Logo mark — bronze ring + sun icon -->
  <g transform="translate(80, 100)">
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="42" fill="none" stroke="url(#ringGrad)" stroke-width="2"/>
    <!-- Inner dark circle -->
    <circle cx="0" cy="0" r="38" fill="#0e0d0b"/>
    <!-- Sun glow -->
    <circle cx="0" cy="0" r="20" fill="url(#sunGlow)" filter="url(#sunShadow)" opacity="0.3"/>
    <!-- Sun SVG icon -->
    <g filter="url(#iconGlow)">
      <circle cx="0" cy="0" r="7" fill="none" stroke="#c4733a" stroke-width="1.5"/>
      <line x1="0" y1="-18" x2="0" y2="-14" stroke="#c4733a" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="0" y1="14" x2="0" y2="18" stroke="#c4733a" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="-12.73" y1="-12.73" x2="-10.6" y2="-10.6" stroke="#c4733a" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="10.6" y1="10.6" x2="12.73" y2="12.73" stroke="#c4733a" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="-18" y1="0" x2="-14" y2="0" stroke="#c4733a" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="14" y1="0" x2="18" y2="0" stroke="#c4733a" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="-12.73" y1="12.73" x2="-10.6" y2="10.6" stroke="#c4733a" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="10.6" y1="-10.6" x2="12.73" y2="-12.73" stroke="#c4733a" stroke-width="1.5" stroke-linecap="round"/>
    </g>
  </g>

  <!-- Text — Seaside Beacon -->
  <text x="145" y="108" font-family="'Cormorant Garamond', 'Georgia', serif" font-size="48" font-weight="500" fill="#e8e0d4" letter-spacing="6">Seaside Beacon</text>

  <!-- Subtle tagline -->
  <text x="148" y="138" font-family="'Instrument Sans', 'Helvetica Neue', sans-serif" font-size="13" font-weight="400" fill="#b8ae9e" letter-spacing="4" text-transform="uppercase">SUNRISE QUALITY FORECAST</text>
</svg>
