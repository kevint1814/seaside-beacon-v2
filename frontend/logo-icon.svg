<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <radialGradient id="sunGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff8e1" stop-opacity="0.95"/>
      <stop offset="60%" stop-color="#dca03c" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#c4733a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ringGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c4733a" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#d4b078" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#c4733a" stop-opacity="0.9"/>
    </linearGradient>
    <filter id="sunShadow">
      <feDropShadow dx="0" dy="0" stdDeviation="12" flood-color="#ffc864" flood-opacity="0.4"/>
      <feDropShadow dx="0" dy="0" stdDeviation="24" flood-color="#c4733a" flood-opacity="0.2"/>
    </filter>
    <filter id="iconGlow">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#c4733a" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Dark background -->
  <rect width="400" height="400" rx="80" fill="#0F0F0F"/>

  <!-- Logo mark -->
  <g transform="translate(200, 185)">
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="100" fill="none" stroke="url(#ringGrad)" stroke-width="3"/>
    <!-- Inner dark circle -->
    <circle cx="0" cy="0" r="92" fill="#0e0d0b"/>
    <!-- Sun glow -->
    <circle cx="0" cy="0" r="48" fill="url(#sunGlow)" filter="url(#sunShadow)" opacity="0.3"/>
    <!-- Sun icon -->
    <g filter="url(#iconGlow)">
      <circle cx="0" cy="0" r="18" fill="none" stroke="#c4733a" stroke-width="2.5"/>
      <line x1="0" y1="-44" x2="0" y2="-34" stroke="#c4733a" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="0" y1="34" x2="0" y2="44" stroke="#c4733a" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="-31.1" y1="-31.1" x2="-24" y2="-24" stroke="#c4733a" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="24" y1="24" x2="31.1" y2="31.1" stroke="#c4733a" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="-44" y1="0" x2="-34" y2="0" stroke="#c4733a" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="34" y1="0" x2="44" y2="0" stroke="#c4733a" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="-31.1" y1="31.1" x2="-24" y2="24" stroke="#c4733a" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="24" y1="-24" x2="31.1" y2="-31.1" stroke="#c4733a" stroke-width="2.5" stroke-linecap="round"/>
    </g>
  </g>

  <!-- Brand name below icon -->
  <text x="200" y="340" text-anchor="middle" font-family="'Cormorant Garamond', 'Georgia', serif" font-size="28" font-weight="500" fill="#e8e0d4" letter-spacing="8">SEASIDE BEACON</text>
</svg>
